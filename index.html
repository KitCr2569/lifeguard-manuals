        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(139, 92, 246, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(16, 185, 129, 0.05) 0%, transparent 50%);
            z-index: -1;
            animation: bgPulse 8s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        /* Header */
        .header {
            text-align: center;
            padding: 40px 20px 20px;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 4px;
            color: #fff;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .logo span {
            color: #3b82f6;
            font-weight: 800;
        }

        .subtitle {
            font-size: 14px;
            color: #6b7280;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Update Status Bar */
        .update-status {
            max-width: 700px;
            margin: 10px auto 0;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .status-badge.loading {
            background: rgba(251, 191, 36, 0.1);
            border: 1px solid rgba(251, 191, 36, 0.3);
            color: #fbbf24;
        }

        .status-badge.live {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #10b981;
        }

        .status-badge.offline {
            background: rgba(107, 114, 128, 0.1);
            border: 1px solid rgba(107, 114, 128, 0.3);
            color: #9ca3af;
        }

        .status-badge.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-badge.loading .status-dot {
            background: #fbbf24;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .status-badge.live .status-dot { background: #10b981; }
        .status-badge.offline .status-dot { background: #9ca3af; }
        .status-badge.error .status-dot { background: #ef4444; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .refresh-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #9ca3af;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .refresh-btn:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.3);
            color: #93c5fd;
        }

        .refresh-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .refresh-btn .spin {
            display: inline-block;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .new-count {
            font-size: 11px;
            color: #10b981;
            font-weight: 500;
        }

        /* New Items Panel */
        .new-items-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            background: rgba(16, 185, 129, 0.12);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #10b981;
            cursor: pointer;
            transition: all 0.25s ease;
            animation: fadeIn 0.5s ease;
        }

        .new-items-badge:hover {
            background: rgba(16, 185, 129, 0.2);
            border-color: rgba(16, 185, 129, 0.5);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.15);
        }

        .new-items-modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
            padding: 20px;
        }

        .new-items-modal {
            background: #141420;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            width: 100%;
            max-width: 520px;
            max-height: 70vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: modalSlideIn 0.3s ease;
        }

        @keyframes modalSlideIn {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .new-items-modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .new-items-modal-header h3 {
            font-size: 16px;
            font-weight: 600;
            color: #e5e7eb;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .new-items-modal-header h3 .count-badge {
            background: linear-gradient(135deg, #10b981, #059669);
            color: #fff;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
        }

        .new-items-modal-close {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #9ca3af;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .new-items-modal-close:hover {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }

        .new-items-modal-body {
            overflow-y: auto;
            padding: 8px 16px 16px;
        }

        .new-item-entry {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 10px;
            transition: all 0.2s;
            text-decoration: none;
            border: 1px solid transparent;
        }

        .new-item-entry:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(59, 130, 246, 0.15);
        }

        .new-item-num {
            font-size: 11px;
            color: #4b5563;
            min-width: 24px;
            text-align: center;
            font-weight: 500;
        }

        .new-item-info {
            flex: 1;
        }

        .new-item-brand {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 2px;
        }

        .new-item-name {
            font-size: 13px;
            font-weight: 500;
            color: #e5e7eb;
        }

        .new-item-type {
            font-size: 10px;
            color: #4b5563;
            margin-top: 2px;
        }

        .new-item-link {
            color: #3b82f6;
            font-size: 16px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .new-item-entry:hover .new-item-link {
            opacity: 1;
        }

        /* Search Container */
        .search-container {
            max-width: 700px;
            margin: 30px auto 20px;
            padding: 0 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            padding-top: 10px;
            padding-bottom: 10px;
        }

        .search-wrapper {
            position: relative;
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .search-wrapper:focus-within {
            border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 8px 32px rgba(59, 130, 246, 0.15);
            transform: translateY(-2px);
        }

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #6b7280;
            font-size: 20px;
            transition: color 0.3s;
        }

        .search-wrapper:focus-within .search-icon {
            color: #3b82f6;
        }

        #searchInput {
            width: 100%;
            padding: 18px 50px 18px 55px;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.5px;
        }

        #searchInput::placeholder {
            color: #4b5563;
        }

        .clear-btn {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #9ca3af;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 13px;
            display: none;
            transition: all 0.2s;
        }

        .clear-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
        }

        /* Filters */
        .filters {
            max-width: 900px;
            margin: 0 auto 20px;
            padding: 0 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .filter-btn {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
            color: #9ca3af;
            cursor: pointer;
            font-size: 12px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: all 0.25s ease;
            text-transform: uppercase;
        }

        .filter-btn:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.3);
            color: #93c5fd;
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-color: transparent;
            color: #fff;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        /* Stats */
        .stats {
            text-align: center;
            padding: 10px 20px;
            color: #6b7280;
            font-size: 13px;
            letter-spacing: 0.5px;
        }

        .stats span {
            color: #3b82f6;
            font-weight: 600;
        }

        /* Results Grid */
        .results {
            max-width: 1200px;
            margin: 0 auto;
            padding: 10px 20px 40px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
        }

        .result-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 16px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            text-decoration: none;
            display: block;
        }

        .result-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 3px;
            height: 100%;
            background: linear-gradient(to bottom, #3b82f6, #8b5cf6);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .result-card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(59, 130, 246, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }

        .result-card:hover::before {
            opacity: 1;
        }

        .card-brand {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #8b5cf6;
            margin-bottom: 6px;
        }

        .card-name {
            font-size: 14px;
            font-weight: 500;
            color: #e5e7eb;
            line-height: 1.4;
            margin-bottom: 8px;
        }

        .card-type {
            font-size: 11px;
            color: #4b5563;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .card-type .dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: #3b82f6;
        }

        .open-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #374151;
            font-size: 18px;
            transition: all 0.3s;
        }

        .result-card:hover .open-icon {
            color: #3b82f6;
            transform: translateY(-50%) translateX(3px);
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            grid-column: 1 / -1;
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .empty-state p {
            color: #4b5563;
            font-size: 15px;
        }

        /* Loading animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-card {
            animation: fadeIn 0.3s ease forwards;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #374151; }

        /* Responsive */
        @media (max-width: 600px) {
            .results { grid-template-columns: 1fr; }
            .logo { font-size: 22px; }
            .header { padding: 24px 20px 16px; }
        }
    </style>
</head>

    function detectBrand(slug) {
        for (const bp of brandPatterns) {
            if (bp.pattern.test(slug)) return { brand: bp.brand, color: bp.color };
        }
        return { brand: 'Other', color: '#6b7280' };
    }

    function formatName(slug) {
        // Remove trailing number codes like -0845, -2008181006
        let name = slug.replace(/-\d{4,}$/g, '').replace(/-\d{3,4}$/g, '');
        // Add spaces before brand transitions
        name = name
            .replace(/([a-z])([A-Z])/g, '$1 $2')
            .replace(/-/g, ' ')
            .replace(/f(\d)/gi, 'f/$1')
            .replace(/(\d)(mm)/gi, '$1$2');
        return name.charAt(0).toUpperCase() + name.slice(1);
    }

    function detectType(slug) {
        if (/lens|f\d|mm|ois|wr|stm|usm|vr|gm|art|contemporary|sport|macro|fisheye|tse|teleconverter|extender|tc\d|hood/i.test(slug)) return 'Lens / Optics';
        if (/eos|a7|a9|a6|zv|fx|rx|gfx|xt\d|xpro|xh|xe|xm|xs|em\d|om\d|z\d|d\d|r\d|r\d0|gr|q\d|sl\d|m\d|cl|dlux|penf|gh\d|g9|s1|s5|d780|d850|zf|zfc|z50|z30|90d|5d|6d|r10/i.test(slug)) return 'Camera / Body';
        if (/flash|speedl|hvl|el\d|v\d|ad\d|tt\d|godox|profoto/i.test(slug)) return 'Flash / Light';
        if (/grip|bg|vg|mbd|mbn|hld/i.test(slug)) return 'Battery Grip';
        if (/mount|adapter|ftz|laea|efm|cfr|mc\d|metabones|fringer/i.test(slug)) return 'Adapter';
        if (/tripod|peak|remote|gpvpt|rmtp/i.test(slug)) return 'Tripod / Remote';
        if (/mic|ecm|rode|wireless/i.test(slug)) return 'Audio / Mic';
        if (/airpods|wh1000|headphone/i.test(slug)) return 'Headphone';
        if (/ipad|imac|macbook|mac|apple|pencil|magic/i.test(slug)) return 'Apple Product';
        if (/switch|xbox|steam|valve/i.test(slug)) return 'Game Console';
        if (/insta360|gopro|dji|action|pocket|avata|goggle|nano/i.test(slug)) return 'Action Cam / Drone';
        if (/squarehood|haoge|hood/i.test(slug)) return 'Lens Hood';
        if (/pelican/i.test(slug)) return 'Carry Case';
        return 'Skin / Accessory';
    }

    // Process slugs into manual objects
    function buildManuals(slugs) {
        return slugs.map(slug => {
            const cleanSlug = slug.replace('https://www.lifeguard-design.com/pages/onlinemanual', '').replace(/^-/, '');
            const { brand, color } = detectBrand(cleanSlug);
            return {
                slug: cleanSlug,
                url: BASE_URL + cleanSlug,
                brand,
                color,
                name: formatName(cleanSlug),
                type: detectType(cleanSlug),
                searchText: (cleanSlug + ' ' + brand + ' ' + formatName(cleanSlug) + ' ' + detectType(cleanSlug)).toLowerCase()
            };
        });
    }

    function extractSlugsFromSitemap(xmlText) {
        const parser = new DOMParser();
        const xml = parser.parseFromString(xmlText, 'text/xml');
        const urls = xml.querySelectorAll('url > loc');
        const slugs = [];

        urls.forEach(loc => {
            const url = loc.textContent;
            const match = url.match(/\/pages\/onlinemanual-(.+)$/);
            if (match) {
                slugs.push(match[1]);
            }
        });

        return [...new Set(slugs)]; // deduplicate
    }

    function mergeSlugs(existingSlugs, newSlugs) {
        const existingSet = new Set(existingSlugs);
        const merged = [...existingSlugs];
        const added = [];

        newSlugs.forEach(slug => {
            // Normalize: remove full URL prefix if present
            const clean = slug.replace('https://www.lifeguard-design.com/pages/onlinemanual-', '');
            if (!existingSet.has(clean)) {
                merged.push(clean);
                added.push(clean);
                existingSet.add(clean);
            }
        });

        return { merged, added };
    }

    async function fetchSitemapData() {
        updateStatusUI('loading', 'กำลังดึงข้อมูลจากเว็บไซต์...');

        try {
            // Try direct fetch first
            let xmlText;
            try {
                const response = await fetch(SITEMAP_URL, { 
                    mode: 'cors',
                    cache: 'no-cache'
                });
                if (response.ok) {
                    xmlText = await response.text();
                }
            } catch (e) {
                // Direct fetch failed (CORS), try proxy
                console.log('Direct fetch failed, trying CORS proxy...');
            }

            // If direct failed, try CORS proxies
            if (!xmlText) {
                const proxies = [
                    'https://api.allorigins.win/raw?url=',
                    'https://corsproxy.io/?',
                    'https://api.codetabs.com/v1/proxy?quest='
                ];

                for (const proxy of proxies) {
                    try {
                        const response = await fetch(proxy + encodeURIComponent(SITEMAP_URL), {
                            cache: 'no-cache'
                        });
                        if (response.ok) {
                            xmlText = await response.text();
                            if (xmlText.includes('<urlset')) break;
                            xmlText = null;
                        }
                    } catch (e) {
                        continue;
                    }
                }
            }

            if (!xmlText || !xmlText.includes('<urlset')) {
                throw new Error('ไม่สามารถดึงข้อมูลได้');
            }

            // Parse sitemap
            const sitemapSlugs = extractSlugsFromSitemap(xmlText);

            if (sitemapSlugs.length === 0) {
                throw new Error('ไม่พบข้อมูลคู่มือใน sitemap');
            }

            // Merge with existing
            const { merged, added } = mergeSlugs(manualSlugs, sitemapSlugs);

            // Save to cache
            localStorage.setItem(CACHE_KEY, JSON.stringify(merged));
            localStorage.setItem(CACHE_TIME_KEY, new Date().toISOString());

            // Rebuild manuals
            manuals = buildManuals(merged);

            // Update UI
            document.getElementById('totalCount').textContent = manuals.length.toLocaleString();
            rebuildAll();

            const newCount = added.length;
            if (newCount > 0) {
                updateStatusUI('live', `✅ อัพเดทแล้ว! พบใหม่ ${newCount} รายการ (รวม ${manuals.length} คู่มือ)`);
                showNewItemsBadge(added);
            } else {
                updateStatusUI('live', `✅ ข้อมูลล่าสุด — ${manuals.length} คู่มือ`);
            }

        } catch (error) {
            console.error('Sitemap fetch error:', error);

            // Try to load from cache
            const cached = localStorage.getItem(CACHE_KEY);
            if (cached) {
                try {
                    const cachedSlugs = JSON.parse(cached);
                    const cacheTime = localStorage.getItem(CACHE_TIME_KEY);
                    manuals = buildManuals(cachedSlugs);
                    document.getElementById('totalCount').textContent = manuals.length.toLocaleString();
                    rebuildAll();

                    // Find new items in cache compared to hardcoded list
                    const hardcodedSet = new Set(manualSlugs);
                    const cachedNewItems = cachedSlugs.filter(s => !hardcodedSet.has(s));
                    
                    const timeStr = cacheTime ? new Date(cacheTime).toLocaleString('th-TH') : 'ไม่ทราบ';
                    updateStatusUI('offline', `📦 ใช้ข้อมูลแคช (${manuals.length} คู่มือ) อัพเดทล่าสุด: ${timeStr}`);
                    
                    if (cachedNewItems.length > 0) {
                        showNewItemsBadge(cachedNewItems);
                    }
                } catch (e) {
                    updateStatusUI('error', `⚠️ ใช้ข้อมูลเดิม ${fallbackCount} คู่มือ — ไม่สามารถเชื่อมต่อเว็บได้`);
                }
            } else {
                updateStatusUI('error', `⚠️ ใช้ข้อมูลเดิม ${fallbackCount} คู่มือ — ไม่สามารถเชื่อมต่อเว็บได้`);
            }
        }
    }

        newItems.forEach((item, i) => {
            itemsHtml += `
                <a href="${item.url}" target="_blank" rel="noopener" class="new-item-entry">
                    <span class="new-item-num">${i + 1}</span>
                    <div class="new-item-info">
                        <div class="new-item-brand" style="color: ${item.color}">${item.brand}</div>
                        <div class="new-item-name">${item.name}</div>
                        <div class="new-item-type">${item.type}</div>
                    </div>
                    <span class="new-item-link">→</span>
                </a>`;
        });

        const overlay = document.createElement('div');
        overlay.id = 'newItemsModal';
        overlay.className = 'new-items-modal-overlay';
        overlay.innerHTML = `
            <div class="new-items-modal">
                <div class="new-items-modal-header">
                    <h3>🆕 รายการที่อัพเดทใหม่ <span class="count-badge">${newItems.length}</span></h3>
                    <button class="new-items-modal-close" onclick="closeNewItemsModal()">✕ ปิด</button>
                </div>
                <div class="new-items-modal-body">
                    ${itemsHtml}
                </div>
            </div>`;

        // Close on overlay click
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) closeNewItemsModal();
        });

        document.body.appendChild(overlay);
    }

    function closeNewItemsModal() {
        const modal = document.getElementById('newItemsModal');
        if (modal) {
            modal.style.animation = 'fadeIn 0.2s ease reverse';
            setTimeout(() => modal.remove(), 200);
        }
    }

    // Close modal with Escape key
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            const modal = document.getElementById('newItemsModal');
            if (modal) {
                closeNewItemsModal();
                e.stopPropagation();
            }
        }
    });

    // === RENDERING ===

    function rebuildAll() {
        renderFilters();
        renderResults();
    }

    function renderFilters() {
        const brandCounts = {};
        manuals.forEach(m => { brandCounts[m.brand] = (brandCounts[m.brand] || 0) + 1; });
        const brands = Object.entries(brandCounts).sort((a, b) => b[1] - a[1]);

        const container = document.getElementById('filters');
        let html = `<button class="filter-btn ${currentFilter === 'All' ? 'active' : ''}" onclick="setFilter('All')">All (${manuals.length})</button>`;
        brands.forEach(([brand, count]) => {
            if (count >= 3) {
                html += `<button class="filter-btn ${currentFilter === brand ? 'active' : ''}" onclick="setFilter('${brand}')">${brand} (${count})</button>`;
            }
        });
        container.innerHTML = html;
    }

    function setFilter(brand) {
        currentFilter = brand;
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.classList.toggle('active', btn.textContent.startsWith(brand) || (brand === 'All' && btn.textContent.startsWith('All')));
        });
        renderResults();
    }

    function renderResults() {
        const container = document.getElementById('results');
        const statsEl = document.getElementById('stats');
        const search = currentSearch.toLowerCase().trim();
        const searchTerms = search.split(/\s+/).filter(t => t.length > 0);

        let filtered = manuals;

        if (currentFilter !== 'All') {
            filtered = filtered.filter(m => m.brand === currentFilter);
        }

        if (searchTerms.length > 0) {
            filtered = filtered.filter(m => searchTerms.every(term => m.searchText.includes(term)));
        }

        statsEl.innerHTML = `แสดง <span>${filtered.length}</span> จาก <span>${manuals.length}</span> คู่มือ`;

        if (filtered.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="icon">📭</div>
                    <p>ไม่พบคู่มือที่ตรงกัน ลองเปลี่ยนคำค้นหาดูครับ</p>
                </div>`;
            return;
        }

        // Limit to 200 for performance, with a note
        const display = filtered.slice(0, 200);
        let html = '';
        display.forEach((m, i) => {
            html += `
                <a href="${m.url}" target="_blank" rel="noopener" class="result-card" style="animation-delay: ${Math.min(i * 20, 300)}ms">
                    <div class="card-brand" style="color: ${m.color}">${m.brand}</div>
                    <div class="card-name">${highlightMatch(m.name, searchTerms)}</div>
                    <div class="card-type">
                        <span class="dot"></span>
                        ${m.type}
                    </div>
                    <span class="open-icon">→</span>
                </a>`;
        });

        if (filtered.length > 200) {
            html += `<div class="empty-state"><p>แสดง 200 จาก ${filtered.length} รายการ — กรุณาพิมพ์เพิ่มเพื่อกรองผลลัพธ์</p></div>`;
        }

        container.innerHTML = html;
    }

    function highlightMatch(text, terms) {
        if (terms.length === 0) return text;
        let result = text;
        terms.forEach(term => {
            const regex = new RegExp(`(${term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            result = result.replace(regex, '<mark style="background:rgba(59,130,246,0.3);color:#93c5fd;border-radius:2px;padding:0 2px">$1</mark>');
        });
        return result;
    }

    function clearSearch() {
        document.getElementById('searchInput').value = '';
        currentSearch = '';
        document.getElementById('clearBtn').style.display = 'none';
        renderResults();
        document.getElementById('searchInput').focus();
    }

    // Event listeners
    document.getElementById('searchInput').addEventListener('input', function(e) {
        currentSearch = e.target.value;
        document.getElementById('clearBtn').style.display = currentSearch ? 'block' : 'none';
        renderResults();
    });

    // Keyboard shortcut
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') clearSearch();
        if (e.key === '/' && document.activeElement !== document.getElementById('searchInput')) {
            e.preventDefault();
            document.getElementById('searchInput').focus();
        }
    });

    // === INIT ===
    renderFilters();
    renderResults();

    // Auto-fetch on page load
    fetchSitemapData();
    </script>
</body>
</html>
